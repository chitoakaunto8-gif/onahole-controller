<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>接続テスト</title>
<style>body {font-family: system-ui; text-align:center; padding:50px; background:#111; color:#fff;}</style>
</head>
<body>
  <h1>Bluetooth接続テスト</h1>
  <button onclick="connectDevice()" style="padding:20px 40px; font-size:20px;">🔗 接続する</button>
  <div id="status" style="margin-top:30px; font-size:18px;">未接続</div>

<script>
const SERVICE_UUID = '0000ffa0-0000-1000-8000-00805f9b34fb';
const CHAR_UUID = '0000ffa1-0000-1000-8000-00805f9b34fb';

let device = null;
let characteristic = null;

async function connectDevice() {
  const status = document.getElementById('status');
  status.textContent = '接続中...';
  try {
    device = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'J-Maelstrom' }],
      optionalServices: [SERVICE_UUID]
    });
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    characteristic = await service.getCharacteristic(CHAR_UUID);
    status.textContent = '✅ 接続成功！ ' + device.name;
    alert('接続できました！');
  } catch (e) {
    status.textContent = '❌ 失敗: ' + e.message;
    console.error(e);
  }
}
</script>
</body>
</html>
